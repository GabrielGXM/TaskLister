<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskLister</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <ul class="Task-List">
            <p>Lista de Tarefas</p>
        </ul>
    </main>
    <footer>
        
        <button onclick="" id="Btn-New-Task-Modal">Adicionar Tarefa</button>
    </footer>
    <dialog class="Modal-New-Task">
        <h3>Adicionar Tarefa</h3>
        <p>Nome</p>
        <input type="text" placeholder="Nome da Tarefa" id="New-Task-Name">
        <p>Frenquência</p>
        <input type="range">

    </dialog>
    <script src="script.js"></script>
</body>
</html>
